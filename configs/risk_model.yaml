# 潜状态：一阶分块因子分析 + 二阶 PCA 综合（可改为 fixed_weights）
latent_state:
  view_extraction: factor_analysis
  second_order:
    method: pca_one_component
  view_weights:
    constitution: 0.35
    activity: 0.25
    metabolic: 0.40
  bootstrap_samples: 50
  stability_top_quantile: 0.20
  report_ci_level: 0.95

# 风险：连续临床严重度目标 + Ridge（不把二分类确诊标签作为主监督，避免复写诊断）
risk_score:
  model_type: anchor_front_logistic
  calibration_bins: 10
  probability_calibration: auto
  calibration_selection_metric: brier_score
  features:
    base:
      - constitution_factor
      - activity_factor
      - metabolic_deviation_total
      - activity_total
      - activity_risk
      - constitution_tanshi
      - dev_bmi
      - dev_fasting_glucose
      - dev_uric_acid
      - age_group
      - background_risk
    interactions:
      tanshi_x_low_activity: [constitution_tanshi, low_activity_flag]
      tanshi_x_bmi_deviation: [constitution_tanshi, dev_bmi]
      metabolic_x_low_activity: [metabolic_deviation_total, low_activity_flag]
      age_x_activity_risk: [age_group, activity_risk]
  severity_model:
    target_weights:
      metabolic_deviation_total: 0.40
      constitution_tanshi: 0.30
      activity_risk: 0.30
    exclude_from_x:
      - hyperlipidemia_label
      - lipid_deviation_total
      - latent_state_h
    alphas: [0.01, 0.05, 0.1, 0.5, 1.0, 3.0, 10.0, 30.0, 100.0]
    cv_folds: 5

# 兼容旧版加权风险（仅当 model_type: legacy_weighted 时使用）
  weights:
    latent_state: 0.30
    lipid_deviation_total: 0.35
    metabolic_deviation_total: 0.15
    activity_risk: 0.10
    constitution_tanshi: 0.05
    background_risk: 0.05
  interaction_weights:
    tanshi_x_low_activity: 0.08
    tanshi_x_bmi_deviation: 0.06
    metabolic_x_low_activity: 0.05

anchors:
  low_profile_min_hits: 3
  high_profile_min_hits: 2
  high_anchor_phlegm_only: false
  adequate_activity_cutoff: 60
  low_activity_cutoff: 40
  low_lipid_quantile: 0.30
  high_lipid_quantile: 0.72
  low_metabolic_quantile: 0.35
  high_metabolic_quantile: 0.68
  low_latent_quantile: 0.38
  high_latent_quantile: 0.62
  high_tanshi_absolute: 60

thresholds:
  search_grid_points: 60
  bootstrap_samples: 50
  min_group_share: 0.12
  severity_features:
    constitution_factor: 0.25
    activity_factor: 0.25
    metabolic_deviation_total: 0.20
    constitution_tanshi: 0.15
    activity_risk: 0.15

rules:
  max_rule_size: 3
  min_coverage: 0.18
  min_purity: 0.55
  bootstrap_samples: 50
  selection_frequency_threshold: 0.55
